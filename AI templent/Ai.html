<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Bot</title>
  <link rel="stylesheet" href="Ai.css" />
  <link rel="icon" href="1.ico" type="image/x-icon">
</head>

<body>
  <div class="theme-toggle">
    <button onclick="toggleTheme()">🌙 Toggle Dark Mode</button>
  </div>

  <div class="main">
    <h1 class="title">
  <img src="https://png.pngtree.com/png-vector/20230104/ourmid/pngtree-chatbot-customer-service-clipart-element-png-image_6551134.png" alt="Chatbot icon">
  <span>AI Chatbot</span>
</h1>
    <div class="chatbox">
      <form method="post" action="/Ai" class="form">
        <input type="text" class="input" name="message" placeholder="Type your message..." required />
        <button id="btn" type="submit">Send</button>
      </form>

      {% if message %}
      <div class="Ai-chat">
        <div class="bubble user"><strong>You:</strong> {{user_message}}</div>
        <div class="bubble bot"><strong>AI Bot:</strong> <span class="typing">{{Ai_resopnse}}</span></div>
      </div>
      {% endif %}
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle("dark");
    }
  </script>
</body>

</html>
